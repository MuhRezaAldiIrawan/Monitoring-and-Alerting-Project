global:
  scrape_interval: 15s        # Seberapa sering Prometheus pull metrics
  evaluation_interval: 15s    # Seberapa sering evaluate alert rules
  scrape_timeout: 10s

# ─── Alert Rules Files ────────────────────────────────────
rule_files:
  - "/etc/prometheus/alerts/*.yml"

# ─── Alertmanager Connection ─────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ─── Scrape Targets ──────────────────────────────────────
scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # App Alpha — E-Commerce API
  - job_name: "app-alpha"
    static_configs:
      - targets: ["app-alpha:3001"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # App Beta — Payment Gateway
  - job_name: "app-beta"
    static_configs:
      - targets: ["app-beta:3002"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Node Exporter — host system metrics (CPU, RAM, Disk)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
